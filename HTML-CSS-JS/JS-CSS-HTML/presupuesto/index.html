<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aplicacion Presupuesto</title>
    <link rel="stylesheet" href="estilos/estilos.css" />
  </head>
  <body onload="cargarApp()">
    <div class="cabecero">
      <div class="presupuesto">
        <div class="presupuesto_titulo">Presupuesto Disponible</div>
        <div id="presupuesto" class="presupuesto_valor">+ 2,300.00</div>
        <div class="presupuesto_ingreso limpiarEstilos">
          <div class="presupuesto_ingreso--texto">Ingresos</div>
          <div class="derecha">
            <div id="ingresos" class="presupuesto_ingreso--valor">+4,000.00</div>
            <div class="presupuesto_ingreso--porcentaje"></div>
          </div>
        </div>
        <div class="presupuesto_egreso limpiarEstilos">
          <div class="presupuesto_egreso--texto">Egresos</div>
          <div class="derecha limpiarEstilos">
            <div id="egresos" class="presupuesto_egreso--valor">- 1,900.00</div>
            <div id="porcentaje" class="presupuesto_egreso--porcentaje">%56</div>
          </div>
        </div>
      </div>
    </div>

    <form action="" id="forma" onsubmit="return false">
      <div class="agregar">
        <div class="agregar_contenedor">
          <select class="agregar_tipo" name="" id="tipo">
            <option value='ingreso' selected>+</option>
            <option value='egreso'>-</option>
          </select>
          <input id="descripcion" type="text" class="agregar_descripcion" placeholder="Agregar Descripcion" />
          <input id="valor" type="number" class="agregar_valor" placeholder="Valor" step="any" />
          <button class="agregar_btn" onclick="agregarDato()">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
          </button>
        </div>
      </div>
    </form>

    <div class="contenedor limpiarEstilos">
      <div class="ingreso">
        <h2 class="ingreso_titulo">Ingresos</h2>
        <div id="lista-ingresos"></div>
      </div>
      <div class="egreso">
        <h2 class="egreso_titulo">Egresos</h2>
        <div id="lista-egresos"></div>
      </div>
    </div>

    <script src="JS/Dato.js"></script>
    <script src="JS/Ingreso.js"></script>
    <script src="JS/Egreso.js"></script>
    <script src="JS/app.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
